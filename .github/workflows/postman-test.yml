name: Postman Automated Collection

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  postman-tests:
    name: Postman Automated Collection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Collection
        run: newman run postman/collections/HVAC\ Agent\ API\ Tests/New\ Request.request.yaml --reporters cli